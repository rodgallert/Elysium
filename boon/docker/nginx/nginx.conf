# boon/docker/nginx/nginx.conf
#
# Edge gateway for Boon. Path-based routing to two SPAs + two APIs + Swagger.
# CRITICAL: /api/checkout is declared BEFORE /api so checkout requests don't fall through to core.
# Nginx matches the most specific prefix, but ordering + exact-vs-prefix matters — keep this order.

upstream core_api          { server core:3000; }
upstream checkout_api      { server checkout:3000; }
upstream core_frontend     { server core-frontend:5173; }      # adjust port to how the SPA is served
upstream checkout_frontend { server checkout-frontend:5173; }

server {
    listen 80;
    server_name localhost elysium.com;

    # --- API: checkout FIRST (more specific), so it wins over /api ---
    # GET /api/checkout/{stub}  and  POST /api/checkout
    location /api/checkout {
        proxy_pass http://checkout_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- API: Swagger docs at exactly /api ---
    # (served by core, or a dedicated docs endpoint; ideally a Swagger UI with a core/checkout dropdown)
    location = /api {
        proxy_pass http://core_api/api;   # e.g. core mounts Swagger UI at /api
        proxy_set_header Host $host;
    }

    # --- API: everything else under /api → core (e.g. /api/products/{id}) ---
    location /api/ {
        proxy_pass http://core_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Frontend: checkout SPA under /checkout (Vite base must be /checkout/) ---
    # Vite's dev server only serves index.html at the exact base path "/checkout/" (trailing
    # slash) — redirect the bare "/checkout" so visitors don't hit a 404 on the no-slash URL.
    location = /checkout {
        return 301 /checkout/;
    }

    location /checkout {
        proxy_pass http://checkout_frontend;
        proxy_set_header Host $host;
    }

    # --- Frontend: core SPA at root ---
    location / {
        proxy_pass http://core_frontend;
        proxy_set_header Host $host;
    }
}

# Notes:
# - Ports (3000 for Rails, 5173 for Vite dev) must match how each service actually listens. If the
#   frontends are built to static files, serve them with `root`/`try_files` instead of proxy_pass.
# - For a production-like static setup, replace the frontend upstreams with `location` blocks that
#   `root` into the built SPA dirs and use `try_files $uri /index.html` for client-side routing.
# - `location = /api` is an exact match; `/api/` is a prefix; `/api/checkout` is a more specific
#   prefix declared first. This ordering is what routes checkout vs. core vs. docs correctly.
